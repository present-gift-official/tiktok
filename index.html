<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プレゼントページ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基本設定 */
        body {
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            color: #333;
            line-height: 1.6;
            background-color: #fff;
        }

        /* メインビジュアル */
        .hero {
            width: 100%;
            text-align: center;
        }
        .hero img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ボタンセクション */
        .action-buttons {
            padding: 30px 20px;
            background-color: #ffffff;
            text-align: center;
        }

        .btn {
            display: block;
            max-width: 300px;
            margin: 10px auto;
            padding: 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            transition: opacity 0.3s;
        }
        .btn-line { background-color: #06C755; }
        .btn:hover { opacity: 0.8; }

        .help-text {
            margin: 15px auto 5px auto;
            font-size: clamp(0.65rem, 3.2vw, 0.85rem);
            color: #555;
            white-space: nowrap;
            font-weight: bold;
        }

        .divider {
            height: 30px;
        }

        /* 追加画像のスタイル */
        .step0-image {
            width: 100%;
            max-width: 250px;
            height: auto;
            display: block;
            margin: 15px auto 25px auto;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* ブラウザで開く手順画像の横並び設定と番号表記 */
        .browser-images {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px auto 10px auto;
            max-width: 100%;
        }
        .browser-image-wrapper {
            width: 48%;
            max-width: 200px;
            text-align: center;
        }
        .image-label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .browser-image-wrapper img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="hero">
    <img src="LP.PNG" alt="LINE">
</div>

<section class="action-buttons">
    <a href="https://lin.ee/5q6GIjW　" class="btn btn-line">LINEアプリを開く</a>

    <p class="help-text">🔻開けない場合は下にスクロールしてください🔻</p>

    <div class="divider"></div>

    <p><b>ボタンを長押し→リンクを開く</b></p>

    <img src="step0.JPEG" alt="step0.JPEG" class="step0-image">

    <p style="font-weight: bold; margin-top: 30px;">またはブラウザで開く</p>

    <div class="browser-images">
        <div class="browser-image-wrapper">
            <div class="image-label">①</div>
            <img src="step1.JPEG" alt="①">
        </div>
        <div class="browser-image-wrapper">
            <div class="image-label">②</div>
            <img src="step2.JPEG" alt="②">
        </div>
    </div>
</section>

</body>
</html>
